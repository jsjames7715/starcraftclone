# StarCraft Clone Configuration File
# Edit this file to customize game settings

[Display]
width=1280
height=720
fullscreen=false
vsync=true
fps_limit=60

[Audio]
music_volume=80
sfx_volume=100
voice_volume=90
mute=false

[Gameplay]
difficulty=normal
game_speed=1.0
auto_save=true
auto_save_interval=300
show_damage_numbers=true
show_minimap=true
show_tooltips=true

[Controls]
mouse_sensitivity=1.0
invert_y=false
keybindings=default

[Graphics]
texture_quality=high
shadow_quality=medium
particle_effects=true
anti_aliasing=4x

[Network]
server_address=localhost
server_port=7777
max_players=8
connection_timeout=30

[Advanced]
debug_mode=false
log_level=info
render_distance=1000
terrain_detail=high
